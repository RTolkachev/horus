services:
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: horus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: horus
      MYSQL_DATABASE: horus_test
      MYSQL_USER: horus
      MYSQL_PASSWORD: horus
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-phorus"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  mysql-data:
